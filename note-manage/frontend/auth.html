<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghi chú - Đăng nhập & Đăng ký</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f8f9fa;
        }

        .form-box {
            width: 100%;
            max-width: 400px;
            display: none;
            background: white;
        }

        .form-box.active {
            display: block;
        }

        form {
            width: 100%;
        }

        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

        .msg-success {
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }

        .msg-error {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }

        .loader {
            display: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 0.2em solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spinner-border .75s linear infinite;
            vertical-align: middle;
            margin-right: 5px;
        }
    </style>
</head>

<body>
    <div class="container-fluid d-flex flex-column justify-content-center align-items-center vh-100">
        <div id="login-form-box" class="form-box active">
            <form class="border rounded border-dark p-4 shadow-sm" onsubmit="handleAuth(event, 'login')">
                <p class="text-center"><strong>Login</strong></p>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary btn-block">
                    <span class="loader"></span>
                    <span class="btn-text">Login</span>
                </button>
                <p class="mt-3 text-center mb-0">Don't have an account? <a href="#"
                        onclick="toggleForm('register')">Register</a></p>
                <div id="login-message" class="mt-3"></div>
            </form>
        </div>

        <div id="register-form-box" class="form-box">
            <form class="border rounded border-dark p-4 shadow-sm" onsubmit="handleAuth(event, 'register')">
                <p class="text-center"><strong>Register</strong></p>
                <div class="form-group">
                    <label>User Name</label>
                    <input type="text" name="username" class="form-control" placeholder="User Name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="password_confirmation" class="form-control"
                        placeholder="Confirm Password" required>
                </div>
                <button type="submit" id="registerBtn" class="btn btn-primary btn-block">
                    <span class="loader"></span>
                    <span class="btn-text">Sign Up</span>
                </button>
                <p class="mt-3 text-center mb-0">Already have an account? <a href="#"
                        onclick="toggleForm('login')">Login</a></p>
                <div id="register-message" class="mt-3"></div>
            </form>
        </div>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function toggleForm(type) {
            const loginBox = document.getElementById('login-form-box');
            const registerBox = document.getElementById('register-form-box');

            // Clear messages when switching
            document.getElementById('login-message').style.display = 'none';
            document.getElementById('register-message').style.display = 'none';

            if (type === 'register') {
                loginBox.classList.remove('active');
                registerBox.classList.add('active');
            } else {
                registerBox.classList.remove('active');
                loginBox.classList.add('active');
            }
        }

        const API_BASE = 'http://127.0.0.1:8000';

        async function handleAuth(event, type) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            const btn = type === 'login' ? document.getElementById('loginBtn') : document.getElementById('registerBtn');
            const btnText = btn.querySelector('.btn-text');
            const loader = btn.querySelector('.loader');
            const messageId = type === 'login' ? 'login-message' : 'register-message';
            const messageDiv = document.getElementById(messageId);

            // Show loading
            btnText.textContent = type === 'login' ? 'Logging in...' : 'Signing up...';
            loader.style.display = 'inline-block';
            btn.disabled = true;
            messageDiv.style.display = 'none';

            try {
                // Ensure we have a session/CSRF cookie by hitting a dummy endpoint if needed
                // For this example, we assume common Laravel behavior where cookies are present
                const url = type === 'login' ? `${API_BASE}/api/login` : `${API_BASE}/api/register`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'X-XSRF-TOKEN': getCookie('XSRF-TOKEN')
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(result.user));

                    messageDiv.className = 'mt-3 alert alert-success';
                    messageDiv.textContent = result.message || (type === 'login' ? 'Đăng nhập thành công!' : 'Đăng ký thành công!');
                    messageDiv.style.display = 'block';

                    if (type === 'login') {
                        setTimeout(() => window.location.href = 'dashboard.html', 1000);
                    } else {
                        setTimeout(() => toggleForm('login'), 1500);
                    }
                } else {
                    messageDiv.className = 'mt-3 alert alert-danger';
                    let errorMsg = result.message || 'Có lỗi xảy ra. Vui lòng thử lại.';

                    if (result.errors) {
                        const errorMsgs = Object.values(result.errors).flat().join(', ');
                        errorMsg += ' (' + errorMsgs + ')';
                    }
                    messageDiv.textContent = errorMsg;
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'mt-3 alert alert-danger';
                messageDiv.textContent = 'Lỗi kết nối server.';
                messageDiv.style.display = 'block';
            } finally {
                // Hide loading
                btnText.textContent = type === 'login' ? 'Login' : 'Sign Up';
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
